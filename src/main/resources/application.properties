spring.application.name=demo

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# RSA Key Paths (Ensure these files exist in src/main/resources/certs/)
rsa.public-key=classpath:certs/public.pem
rsa.private-key=classpath:certs/private.pem

logging.level.org.springframework.security=debug

# JWT Security Configuration
# Access token expiration in minutes (short-lived, default: 15 minutes)
app.security.access-token.expiration-minutes=15

# Refresh token expiration in days (longer-lived, default: 7 days)
app.security.refresh-token.expiration-days=7

# Enable refresh token reuse detection (detects token theft)
app.security.refresh-token.detect-reuse=true

debug=true
